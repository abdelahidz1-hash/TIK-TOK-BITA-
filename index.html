<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>بوت الزخرفة الشامل</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080810;
    --surface: #10101e;
    --card: #14142a;
    --border: #1e1e3a;
    --orange: #ff5c00;
    --orange2: #ff8c42;
    --text: #f0f0ff;
    --muted: #6666aa;
    --bot-bubble: #14142a;
    --user-bubble: linear-gradient(135deg, #ff5c00, #ff8c42);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Cairo', sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

  .header { display: flex; align-items: center; gap: 12px; padding: 16px 20px; background: var(--surface); border-bottom: 1px solid var(--border); position: relative; z-index: 10; }
  .avatar { width: 44px; height: 44px; border-radius: 50%; background: linear-gradient(135deg, var(--orange), var(--orange2)); display: flex; align-items: center; justify-content: center; font-size: 1.3rem; }
  .name { font-weight: 900; }

  .chat { flex: 1; overflow-y: auto; padding: 20px 16px; display: flex; flex-direction: column; gap: 14px; scroll-behavior: smooth; }
  .row { display: flex; align-items: flex-end; gap: 8px; animation: popIn .25s ease both; }
  @keyframes popIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  .row.bot { flex-direction: row; }
  .row.user { flex-direction: row-reverse; }

  .bubble { max-width: 85%; padding: 12px 16px; border-radius: 18px; font-size: .95rem; line-height: 1.6; }
  .row.bot .bubble { background: var(--bot-bubble); border: 1px solid var(--border); border-bottom-right-radius: 4px; }
  .row.user .bubble { background: var(--user-bubble); color: #fff; border-bottom-left-radius: 4px; font-weight: 700; }

  .styles-grid { display: flex; flex-direction: column; gap: 8px; margin-top: 10px; }
  .style-row { background: #0f0f1e; border: 1px solid var(--border); border-radius: 10px; padding: 8px 12px; display: flex; justify-content: space-between; align-items: center; gap: 10px; }
  .style-label { font-size: 0.6rem; color: var(--orange); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 2px; }
  .style-text { color: #fff; font-size: 1.1rem; word-break: break-all; }
  
  .cp { padding: 5px 12px; border-radius: 7px; border: 1.5px solid var(--border); background: transparent; color: var(--muted); cursor: pointer; font-family: 'Cairo'; font-size: .75rem; transition: .2s; flex-shrink: 0; }
  .cp:hover { border-color: var(--orange); color: var(--orange); }
  .cp.done { border-color: #22c55e; color: #22c55e; }

  .input-area { display: flex; gap: 10px; padding: 14px 16px; background: var(--surface); border-top: 1px solid var(--border); }
  input { flex: 1; background: var(--card); border: 2px solid var(--border); border-radius: 12px; padding: 12px 16px; color: #fff; font-family: 'Cairo'; outline: none; }
  .send-btn { width: 48px; height: 48px; border-radius: 12px; border: none; background: linear-gradient(135deg, var(--orange), var(--orange2)); color: #fff; cursor: pointer; font-size: 1.2rem; }

  .typing { display: flex; gap: 4px; padding: 5px; }
  .dot { width: 6px; height: 6px; background: var(--muted); border-radius: 50%; animation: bounce 1s infinite; }
  .dot:nth-child(2) { animation-delay: .2s; }
  .dot:nth-child(3) { animation-delay: .4s; }
  @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
</style>
</head>
<body>

<div class="header">
  <div class="avatar">🤖</div>
  <div class="name">بوت الزخرفة المطور</div>
</div>

<div class="chat" id="chat"></div>

<div class="input-area">
  <input id="inp" type="text" placeholder="اسم | 1 للفراغ | 2 للرموز" maxlength="30">
  <button class="send-btn" onclick="send()">➔</button>
</div>

<script>
const SYMBOLS = ["☂", "☄", "☃", "☼", "☜", "☞", "✎", "☁", "♨", "❄", "𖣔", "❆", "𐓷", "𐓏", "✆", "✇", "☏", "❤︎", "☠︎", "☸", "✿"];

const STYLES = [
  { label: "Bold", map: "𝗔𝗕𝗖𝗗𝗘𝗙𝗚𝗛𝗜𝗝𝗞𝗟𝗠𝗡𝗢𝗣𝗤𝗥𝗦𝗧𝗨𝗩𝗪𝗫𝗬𝗭𝗮𝗯𝗰𝗱𝒆𝗳𝒈𝒉𝒊𝒋𝒌𝒍𝒎𝒏𝒐𝒑𝗾𝒓𝒔𝒕𝒖𝒗𝘄𝘅𝘆𝘇" },
  { label: "Italic", map: "𝘈𝘉𝘊𝘋𝘌𝘍𝘎𝘏𝘐𝘑𝘒𝘓𝘔𝘕𝘖𝘗𝘘𝘙𝘚𝘛𝘜𝘝𝘞𝘟𝘠𝘡𝘢𝘣𝘤𝘥𝘦𝘧𝘨𝘩𝘪𝘫𝒌𝘭𝘮𝘯𝘰𝘱𝘲𝘳𝘴𝘵𝘶𝘷𝘸𝘹𝘺𝘻" },
  { label: "Bold Italic", map: "𝑨𝑩𝑪𝑫𝑬𝑭𝑮𝑯𝑰𝑱𝑲𝑳𝑴𝑵𝑶𝑷𝑸𝑹𝑺𝑻𝑼𝑽𝑾𝑿𝒀𝒁𝒂𝒃𝒄𝒅𝒆𝒇𝒈𝒉𝒊𝒋𝒌𝒍𝒎𝒏𝒐𝒑𝒒𝒓𝒔𝒕𝒖𝒗𝒘𝒙𝒚𝒛" },
  { label: "Script", map: "𝒜ℬ𝒞𝒟ℰℱ𝒢ℋℐ𝒥𝒦ℒℳ𝒩𝒪𝒫𝒬ℛ𝒮𝒯𝒰𝒱𝒲𝒳𝒴𝒵𝒶𝒷𝒸𝒹𝑒𝒻𝑔𝒽𝒾𝒿𝓀𝓁𝓂𝓃𝑜𝓅𝓆𝓇𝓈𝓉𝓊𝓋𝓌𝓍𝓎𝓏" },
  { label: "Bold Script", map: "𝓐𝓑𝓒𝓓𝓔𝓕𝓖𝓗𝓘𝓙𝓚𝓛𝓜𝓝𝓞𝓟𝓠𝓡𝓢𝓣𝓤𝓥𝓦𝓧𝓨𝓩𝓪𝓫𝓬𝓭𝓮𝓯𝓰𝓱𝓲𝓳𝓴𝓵𝓶𝓷𝓸𝓹𝓺𝓻𝓼𝓽𝓾𝓿𝔀𝔁𝔂𝔃" },
  { label: "Fraktur", map: "𝔄𝔅ℭ𝔇𝔈𝔉𝔊ℌℑ𝔍𝔎𝔏𝔐𝔑𝔒𝔓𝔔ℜ𝔖𝔗𝔘𝔙𝔚𝔛𝔜ℨ𝔞𝔟𝔠𝔡𝔢𝔣𝔤𝔥𝔦𝔧𝔨𝔩𝔪𝔫𝔬𝔭𝔮𝔯𝔰𝔱𝔲𝔳𝔴𝔵𝔶𝔷" },
  { label: "Double Struck", map: "𝔸𝔹ℂ𝔻𝔼𝔽𝔾ℍ𝕀𝕁𝕂𝕃𝕄ℕ𝕆ℙℚℝ𝕊𝕋𝕌𝕍𝕎𝕏𝕐ℤ𝕒𝕓𝕔𝕕𝕖𝕗𝕘𝕙𝕚𝕛𝕜𝕝𝕞𝕟𝕠𝕡𝕢𝕣𝕤𝕥𝕦𝕧𝕨𝕩𝕪𝕫" },
  { label: "Circled", map: "ⒶⒷⒸⒹⒺⒻⒼⒽⒾⒿⓀⓁⓂⓃⓄⓅⓆⓇⓈⓉⓊⓋⓌⓍⓎⓏⓐⓑⓒⓓⓔⓕⓖⓗⓘⓙⓚⓛⓜⓝⓞⓟⓠⓡⓢⓣⓤⓥⓦⓧⓨⓩ" },
  { label: "Wide", map: "ＡＢＣＤＥＦＧＨＩＪＫＬＭＮＯＰＱＲＳＴＵＶＷＸＹＺａｂｃｄｅｆｇｈｉｊｋｌｍｎｏｐｑｒｓｔｕｖｗｘｙｚ" },
  { label: "Bold Fraktur", map: "𝕬𝕭𝕮𝕯𝕰𝕱𝕲𝕳𝕴𝕵𝕶𝕷𝕸𝕹𝕺𝕻𝕼𝕽𝕾𝕿𝖀𝖁𝖂𝖃𝖄𝖅𝖆𝖇𝖈𝖉𝖊𝖋𝖌𝖍𝖎𝖏𝖐𝖑𝖒𝖓𝖔𝖕𝖖𝖗𝖘𝖙𝖚𝖛𝖜𝖝𝖞𝖟" },
];

function botReply(html) {
  const chat = document.getElementById("chat");
  const tRow = document.createElement("div");
  tRow.className = "row bot"; tRow.id = "typing";
  tRow.innerHTML = `<div class="bubble"><div class="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>`;
  chat.appendChild(tRow);
  chat.scrollTop = chat.scrollHeight;

  setTimeout(() => {
    tRow.remove();
    const row = document.createElement("div");
    row.className = "row bot";
    row.innerHTML = `<div class="bubble">${html}</div>`;
    chat.appendChild(row);
    chat.scrollTop = chat.scrollHeight;
  }, 600);
}

function cp(text, btn) {
  navigator.clipboard.writeText(text).then(() => {
    const old = btn.textContent;
    btn.textContent = "تم"; btn.classList.add("done");
    setTimeout(() => { btn.textContent = old; btn.classList.remove("done"); }, 1500);
  });
}

function send() {
  const inp = document.getElementById("inp");
  const val = inp.value.trim();
  if (!val) return;
  
  const userRow = document.createElement("div");
  userRow.className = "row user";
  userRow.innerHTML = `<div class="bubble">${val}</div>`;
  document.getElementById("chat").appendChild(userRow);
  inp.value = "";

  if (val === "1") {
    botReply(`<b>الاسم الفارغ جاهز:</b>
      <div class="style-row" style="margin-top:10px">
        <span class="style-text">‎</span>
        <button class="cp" onclick="cp('‎', this)">نسخ الفراغ</button>
      </div>`);
  } 
  else if (val === "2") {
    let grid = `<div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-top:10px;">`;
    SYMBOLS.forEach(s => {
      grid += `<div class="style-row"><span class="style-text">${s}</span><button class="cp" onclick="cp('${s}', this)">نسخ</button></div>`;
    });
    grid += `</div>`;
    botReply(`<b>قائمة الرموز:</b>${grid}`);
  } 
  else {
    let res = `<div class="styles-grid">`;
    STYLES.forEach(st => {
      let styled = [...val].map(c => {
        let i = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz".indexOf(c);
        return i !== -1 ? [...st.map][i] : c;
      }).join("");
      res += `<div class="style-row">
                <div style="flex:1">
                  <div class="style-label">${st.label}</div>
                  <div class="style-text">${styled}</div>
                </div>
                <button class="cp" onclick="cp('${styled}', this)">نسخ</button>
              </div>`;
    });
    res += `</div>`;
    botReply(`<b>زخارف لـ ${val}:</b>${res}`);
  }
}

document.getElementById("inp").addEventListener("keypress", (e) => { if(e.key === "Enter") send(); });
window.onload = () => botReply("أهلاً بك! 🤖<br><br>• أرسل رقم <b>1</b> لاسم فارغ.<br>• أرسل رقم <b>2</b> للرموز.<br>• أرسل أي اسم لزخرفته بعدة أشكال.");
</script>
</body>
</html>
