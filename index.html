// كلاس الجسيم (الشرارة)
class Particle {
  constructor() {
    this.reset();
  }

  reset() {
    this.x = Math.random() * width; // موقع أفقي عشوائي
    this.y = height + Math.random() * 100; // تبدأ من أسفل الشاشة
    this.size = Math.random() * 3 + 1; // حجم عشوائي
    this.speedY = Math.random() * -3 - 1; // سرعة للأعلى
    this.speedX = Math.random() * 2 - 1; // حركة أفقية خفيفة
    this.life = Math.random() * 100 + 50; // مدة الحياة
    this.maxLife = this.life;
    
    // تدرج لوني بين البرتقالي والأصفر
    const r = 255;
    const g = Math.floor(Math.random() * 100 + 100); // 100 - 200
    const b = 0;
    this.color = `rgb(${r},${g},${b})`;
  }

  update() {
    this.y += this.speedY;
    this.x += this.speedX;
    this.life--;

    // تقليص الحجم مع اقتراب الموت
    if (this.size > 0.2) this.size -= 0.01;

    // إذا ماتت الجسيمة أو خرجت من الشاشة، أعد ضبطها
    if (this.life <= 0 || this.y < -10) {
      this.reset();
    }
  }

  draw() {
    ctx.globalAlpha = this.life / this.maxLife; // شفافية تعتمد على العمر
    ctx.fillStyle = this.color;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fill();
    
    // إضافة توهج (Glow)
    ctx.shadowBlur = 10;
    ctx.shadowColor = this.color;
  }
}

// إنشاء الجسيمات
function initParticles() {
  particles = [];
  const particleCount = 100; // عدد الشرارات
  for (let i = 0; i < particleCount; i++) {
    particles.push(new Particle());
  }
}

// حلقة التحريك
function animate() {
  ctx.clearRect(0, 0, width, height); // مسح الكانفاس
  ctx.globalCompositeOperation = 'lighter'; // نمط دمج للألوان الزاهية

  particles.forEach(p => {
    p.update();
    p.draw();
  });
  
  // إعادة تعيين التأثيرات الافتراضية للرسم القادم
  ctx.shadowBlur = 0;
  ctx.globalAlpha = 1;
  ctx.globalCompositeOperation = 'source-over';

  requestAnimationFrame(animate);
}

// التشغيل

animate();

        let first = FF_CODES[i]; let second = FF_CODES[i+1];
        ffHtml += `<div style="display:flex; gap:8px;"><div class="style-row" style="flex:1;"><span>${first.f}</span><button class="cp" onclick="cp('${first.c}', this)">نسخ</button></div>`;
        if (second) ffHtml += `<div class="style-row" style="flex:1;"><span>${second.f}</span><button class="cp" onclick="cp('${second.c}', this)">نسخ</button></div>`;
        ffHtml += `</div>`;
      }
      botReply(`أكواد الأعلام:<br>${ffHtml}`);
      state = "idle";
    } else if (val === "2") {
      let normalHtml = "";
      NORMAL_CODES.forEach(item => {
        normalHtml += `<div class="style-row"><span style="font-size:0.75rem;">${item.n}</span><button class="cp" onclick="cp('${item.c}', this)">نسخ</button></div>`;
      });
      botReply(`الأكواد العادية:<br>${normalHtml}`);
      state = "idle";
    } else { botReply("يرجى اختيار 1 أو 2."); }
  } else if (state === "waiting_color_name") {
    let colorHtml = "";
    COLORS.forEach(color => {
      let hexColor = "#" + color.c.substring(1, 7);
      colorHtml += `<div class="style-row"><span style="color: ${hexColor}; font-size:0.85rem;">${val}</span><button class="cp" onclick="cp('${color.c}${val}', this)">نسخ</button></div>`;
    });
    botReply(`اسمك ملوناً:<br>${colorHtml}`);
    state = "idle";
  } else if (val === "1") {
    botReply(`الاسم فارغ:<br><div class="style-row"><span>ㅤ</span><button class="cp" onclick="cp('ㅤ', this)">نسخ</button></div>`);
  } else if (val === "2") {
    let symHtml = "";
    for(let s of SYMBOLS) { if(s.trim()) symHtml += `<button class="symbol-btn" onclick="cp('${s}', this)">${s}</button>`; }
    botReply(`الرموز المميزة:<br><div style="display:flex; flex-wrap:wrap; justify-content:center;">${symHtml}</div>`);
  } else if (val === "3") {
    state = "waiting_color_name";
    botReply("أرسل الاسم الذي تريد تلوينه...");
  } else if (val === "4") {
    let clanHtml = "";
    CLAN_NAMES.forEach(name => {
      if(name.trim()) clanHtml += `<div class="style-row"><span style="font-size:0.8rem;">${name}</span><button class="cp" onclick="cp('${name}', this)">نسخ</button></div>`;
    });
    botReply(`أسماء الكلانات:<br>${clanHtml}`);
  } else if (val === "5") {
    state = "waiting_ff_choice";
    botReply("ماذا تحتاج؟<br>1️⃣ - أكواد الأعلام<br>2️⃣ - أكواد عادية");
  } else {
    botReply(`زخرفة "${val}":<br>${decorate(val)}`);
  }
  inp.value = "";
  // تمرير تلقائي لأسفل عند الإرسال
  const chatDiv = document.getElementById("chat");
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

// دعم الإرسال بزر Enter
document.getElementById("inp").addEventListener("keypress", function(e) {
  if (e.key === "Enter") send();
});

window.onload = () => { showWelcome(); resize(); };
</script>
