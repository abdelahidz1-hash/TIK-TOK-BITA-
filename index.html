<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            background-image: url('https://freefiremobile-a.akamaihd.net/common/web_event/official2.ff.garena.all/img/20228/2c4f40e9808ef5a6b20ee641ace2cfe5.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            margin: 0;
            height: 100vh;
            display: flex;
            font-family: sans-serif;
            overflow: hidden;
        }

        .bottom-controls {
            position: fixed;
            bottom: 30px;
            right: 30px;
            display: flex;
            flex-direction: column;
            align-items: center; 
            gap: 12px; 
            z-index: 999;
        }

        .loading-wrapper {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 16px;
            background: rgba(0, 0, 0, 0.8);
            border-radius: 20px;
            border: 1px solid rgba(255, 69, 0, 0.5);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
        }

        .pro-loader-container {
            width: 210px; 
            height: 6px;
            background: #111;
            border-radius: 10px;
            overflow: hidden;
        }

        .pro-progress-bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #ff4500, #ffba00);
            box-shadow: 0 0 12px #ff4500;
            transition: width 0.6s linear;
        }

        .pro-percentage {
            color: #fff;
            font-size: 14px;
            font-weight: bold;
            font-family: monospace;
            min-width: 40px;
        }

        #actionBtn {
            display: none;
            width: 60px;
            height: 60px;
            background: rgba(0, 0, 0, 0.8);
            border: 2px solid #00ffff;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.6);
            padding: 5px;
            animation: bounce 2s infinite;
        }

        #actionBtn img { width: 100%; filter: invert(1); }

        #siteOverlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 10000;
        }

        #siteFrame {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* زر الرجوع المحدث */
        .back-btn {
            position: absolute;
            top: 15px;
            left: 15px;
            width: 40px; /* الحجم المطلوب 40 بكسل */
            height: 40px;
            background: rgba(0, 0, 0, 0.7);
            border: 1.5px solid #ff4500;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10001;
            padding: 0;
            overflow: hidden;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .back-btn img {
            width: 70%; /* حجم الصورة داخل الـ 40 بكسل */
            height: auto;
            filter: invert(1); /* جعل السهم أبيض */
        }

        .back-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 0 10px #ff4500;
        }

        .mic-btn-medium {
            width: 55px;
            height: 55px;
            background: #1a1a1a;
            border: 2px solid #ff4500;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .mic-btn-medium img { width: 55%; filter: invert(1); }
        .mic-btn-medium.playing { animation: pulse-med 1.5s infinite; border-color: #00ffff; }

        @keyframes pulse-med { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
    </style>
</head>
<body onclick="startOnFirstClick()">

    <div id="siteOverlay">
        <button class="back-btn" onclick="closeSite()">
            <img src="https://images.icon-icons.com/4230/PNG/512/right_circle_arrow_icon_263631.png" alt="Back">
        </button>
        <iframe id="siteFrame" src=""></iframe>
    </div>

    <div class="bottom-controls">
        <button class="mic-btn-medium" id="playBtn" onclick="toggleMusic(event)">
            <img id="iconImg" src="https://images.icon-icons.com/1152/PNG/512/1486506271-music-mute-sound-volume-speaker-audio-player_81465.png">
        </button>

        <div class="loading-wrapper" id="loaderBox">
            <div class="pro-loader-container"><div class="pro-progress-bar" id="myBar"></div></div>
            <div class="pro-percentage" id="percentText">0%</div>
        </div>

        <button id="actionBtn" onclick="openSite()">
            <img src="https://images.icon-icons.com/4230/PNG/96/left_circle_arrow_icon_263625.png">
        </button>
    </div>

    <audio id="bgMusic" loop>
        <source src="https://res.cloudinary.com/dpggetoyh/video/upload/v1776255094/Legacy___Free_Fire_x_Alok_M4A_128K_kftymq.m4a" type="audio/mp4">
    </audio>

    <script>
        const music = document.getElementById('bgMusic');
        const bar = document.getElementById('myBar');
        const percentText = document.getElementById('percentText');
        const loaderBox = document.getElementById('loaderBox');
        const actionBtn = document.getElementById('actionBtn');
        const siteOverlay = document.getElementById('siteOverlay');
        const siteFrame = document.getElementById('siteFrame');
        const iconImg = document.getElementById('iconImg');
        const playBtn = document.getElementById('playBtn');

        function moveLoader() {
            let width = 0;
            let id = setInterval(() => {
                if (width >= 100) {
                    clearInterval(id);
                    loaderBox.style.display = 'none';
                    actionBtn.style.display = 'block';
                } else {
                    width++;
                    bar.style.width = width + '%';
                    percentText.innerHTML = width + '%';
                }
            }, 600);
        }

        function openSite() {
            siteFrame.src = "https://abdelahidz1-hash.github.io/bot_zakrafa/";
            siteOverlay.style.display = 'block';
        }

        function closeSite() {
            siteOverlay.style.display = 'none';
            siteFrame.src = "";
        }

        window.onload = moveLoader;
        function startOnFirstClick() { if (!window.hasStarted) { playAudio(); window.hasStarted = true; } }
        function toggleMusic(event) { event.stopPropagation(); music.paused ? playAudio() : pauseAudio(); }
        function playAudio() { music.play(); playBtn.classList.add('playing'); iconImg.src = "https://images.icon-icons.com/1152/PNG/96/1486506275-high-loud-music-on-sound-speaker-volume_81461.png"; }
        function pauseAudio() { music.pause(); playBtn.classList.remove('playing'); iconImg.src = "https://images.icon-icons.com/1152/PNG/512/1486506271-music-mute-sound-volume-speaker-audio-player_81465.png"; }
    </script>
</body>
  </html>
