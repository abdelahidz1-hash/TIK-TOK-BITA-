<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>𝑩𝑶𝑻 𝒁𝑨5𝑹𝑨𝑭𝑨</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080810;
    --surface: rgba(16, 16, 30, 0.8); 
    --card: rgba(20, 20, 42, 0.85);
    --border: rgba(255, 255, 255, 0.1);
    --orange: #ff5c00;
    --text: #f0f0ff;
    --bot-bubble: rgba(20, 20, 42, 0.9);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; transition: background 0.3s, color 0.3s; }
  
  body { 
    font-family: 'Cairo', sans-serif; 
    background: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)), 
                url('https://dl.dir.freefiremobile.com/common/web_event/official2.ff.garena.all/202210/c11fd3c42b73afb36692311e71968192.jpg');
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
    color: var(--text); 
    height: 100vh; 
    display: flex; 
    flex-direction: column; 
    overflow: hidden; 
  }

  #settings-overlay {
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background: white;
    z-index: 2000;
    display: none; 
    flex-direction: column;
    align-items: center;
    justify-content: center;
    animation: fadeIn 0.3s ease;
  }

  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  .close-settings {
    position: absolute;
    top: 20px;
    right: 20px;
    background: #f0f0f0;
    border: none;
    padding: 10px 15px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 20px;
    color: #333;
  }

  .header { 
    display: flex; align-items: center; justify-content: space-between; 
    padding: 16px 20px; background: var(--surface); backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--border); z-index: 1001; 
  }
  
  .header-btns { display: flex; gap: 15px; align-items: center; }

  .name { 
    font-weight: 900; font-size: 1.1rem; 
    background: linear-gradient(to right, #ff5c00, #ff00fb, #007BFF, #ff5c00);
    background-size: 200% auto; -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    animation: rainbow-move 3s linear infinite;
  }
  @keyframes rainbow-move { 0% { background-position: 0% center; } 100% { background-position: 200% center; } }

  .chat { flex: 1; overflow-y: auto; padding: 24px 20px; display: flex; flex-direction: column; gap: 16px; }
  .row { display: flex; align-items: flex-end; gap: 10px; animation: popIn .3s ease-out both; }
  @keyframes popIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
  .row.bot { flex-direction: row; }
  .row.user { flex-direction: row-reverse; }
  
  .bubble { 
    max-width: 95%; padding: 14px 18px; border-radius: 20px; font-size: .95rem; line-height: 1.6; 
    backdrop-filter: blur(8px);
  }
  .row.bot .bubble { background: var(--bot-bubble); border: 1px solid var(--border); color: var(--text); }
  .row.user .bubble { background: transparent; color: var(--text); font-weight: 700; }

  .input-area { 
    display: flex; gap: 12px; padding: 18px 20px; background: var(--surface); 
    backdrop-filter: blur(15px); border-top: 1px solid var(--border); 
  }
  input#inp { 
    flex: 1; background: rgba(255, 255, 255, 0.05); border: 1px solid var(--border); 
    border-radius: 16px; padding: 14px 20px; color: var(--text); outline: none; 
  }
  .send-btn { width: 56px; height: 56px; border-radius: 16px; border: none; background: var(--orange); color: #fff; cursor: pointer; }

  .style-row { 
    background: rgba(255, 255, 255, 0.05); border: 1px solid var(--border); 
    border-radius: 12px; padding: 8px 12px; display: flex; 
    justify-content: space-between; align-items: center; margin-bottom: 8px;
  }

  .style-row span { margin-left: 10px; font-size: 0.85rem; font-weight: bold; overflow: hidden; text-overflow: ellipsis; white-space: pre-wrap; }

  .cp { 
    padding: 4px 8px; border-radius: 8px; border: 1px solid var(--orange); 
    background: transparent; color: var(--orange); cursor: pointer; 
    font-weight: bold; font-size: 0.65rem; min-width: 45px; text-align: center;
  }
  
  .symbol-btn {
    width: 40px; height: 40px; display: flex; align-items: center; justify-content: center;
    font-size: 1rem; margin: 3px; background: rgba(255, 255, 255, 0.05);
    border: 1px solid var(--orange); color: var(--text); border-radius: 10px; cursor: pointer;
  }

  .cp.done, .symbol-btn.done { border-color: #2ECC71; color: #2ECC71; }
  
  .nav-btn { background:none; border:none; cursor:pointer; display: flex; align-items: center; opacity: 0.8; }
  .nav-btn:hover { opacity: 1; }
  .nav-btn img { width: 28px; height: 28px; object-fit: contain; }
</style>
</head>
<body>

<div id="settings-overlay">
  <button class="close-settings" onclick="toggleSettings(false)">✕</button>
  <div style="color: #333; font-weight: bold;">واجهة الإعدادات</div>
</div>

<div class="header">
  <div class="name">𝑩𝑶𝑻 𝒁𝑨5𝑹𝑨𝑭𝑨</div>
  <div class="header-btns">
    <a href="https://tiktok.com/@abdelahi.ff.dz.17" target="_blank" class="nav-btn" title="تيك توك">
      <img src="https://images.icon-icons.com/2992/PNG/96/tiktok_logo_icon_187324.png" alt="TikTok">
    </a>
    <button class="nav-btn" onclick="clearChat()" title="مسح المحادثة">
      <img src="https://cdn-icons-png.flaticon.com/128/3334/3334345.png" alt="Delete">
    </button>
    <button class="nav-btn" onclick="toggleSettings(true)" title="الإعدادات">
      <img src="https://cdn-icons-png.flaticon.com/128/18976/18976235.png" alt="Settings">
    </button>
  </div>
</div>

<div class="chat" id="chat"></div>

<div class="input-area">
  <input id="inp" type="text" placeholder="اكتب اسمك أو رقم الخيار..." maxlength="30">
  <button class="send-btn" onclick="send()">➔</button>
</div>

<script>
let state = "idle"; 

const FF_CODES = [
  { f: "🇩🇿", c: "[b][008000]█[FFFFFF]█[CC0000]█ ALGERIA ❤️" },
  { f: "🇹🇳", c: "[b][CC0000]█[FFFFFF]🇹🇳[CC0000]█ TUNISIA ❤️" },
  { f: "🇵🇸", c: "[b][000000]█[008000]█[FFFFFF]█[CC0000] PALESTINE" },
  { f: "🇲🇦", c: "[b][CC0000]█[00FF33]★[CC0000]█ MOROCCO 🇲🇦" },
  { f: "🇸🇾", c: "[b][FF0000]█[FFFFFF]█[000000]█ SYRIA [00FF00]★★" },
  { f: "🇯🇴", c: "[b][CC0000]★[000000]█[FFFFFF]█[008000]█ JORDAN 🇯🇴" },
  { f: "🇱🇾", c: "[b][000000]█[FF0000]█[008000]█ LIBYA" },
  { f: "🇲🇷", c: "[b][008000]█[FFFF00]☪[008000]█ MAURITANIA" },
  { f: "🇸🇦", c: "[008000]█[FFFFFF]⚔️[008000]█ KSA" },
  { f: "🇪🇬", c: "[b][FF0000]█[FFFFFF]█[000000]█ EGYPT" },
  { f: "🇮🇶", c: "[b][FF0000]█[FFFFFF]الله أكبر[000000]█ IRAQ" },
  { f: "🇦🇪", c: "[FF0000]█[008000]█[FFFFFF]█[000000]█ UAE" },
  { f: "🇰🇼", c: "[b][000000]█[008000]█[FFFFFF]█[FF0000]█ KUWAIT" }
];

const NORMAL_CODES = [
  { n: "كود المنزل", c: "[B][C]╱◥██████◣\n[7F00FF]│∩│▤│▤│▤\n▓▓▓▓▓▓▓▓▓" },
  { n: "كود التدخين", c: "[b][6D7B8B]ᝰ[FFFFFF]▄▄▄▄▄▄[FFA000]▄▄▄\nGOLD FLAKE" },
  { n: "كود الحب", c: "[FF0200]♥[FFFFFF]● ● \n/█\\/▓\\[FF0200]Ｉ LOVE U" },
  { n: "كود BUS", c: "[B][C][00FFFF]╭━┳━┳━━┳━╮\n│──── BUS ┃□│\n╰◉─◉─━──◉╯" },
  { n: "كود القلب", c: "[b][c][FF0000]✿\n[00FF00]᭄⸙  I ❤️ I LOVE YOU" }
];

const CLAN_NAMES = [
  "ONLYㅤGOATSAㅤ??", "Only legend", "ONLYㅤGangㅤ??", "!ᴿᴱˣㅤBRAZIL", "ＩＱᅠ〆 T E A M",
  "AD | SUPER Primeﾠﾠ〆 28", "Z  𓆩KAFN𓆪 ˣ", "𓆩O N L Y𓆪 〆9 A L 3 T", "WOLF TENX", "ＪＯＲＤＡＮ",
  "ᵀᴵᴷ ヽᴘᴀ❀ɴᴇʟ", "ＧＳＧ〆IＲＡQ", "７Ｒ ＴＥＡＭ", "ᵀᵉᵃᵐツᎳᎪᏒᏒᎥᎾᏒ", "ᵀᵉᵃᵐ彡SHᎪDᎾᎳ",
  "ɢʜᴏsᴛ • ᴮᵁˢᵀᴱᴿ", "ʜᴇᴀʀᴛs乂ʙʀᴏᴋᴇɴ", "ᵀᵉᵃᵐ★Cobra", "ＴＨＵＧ々ＬＩＦ Ꭼ", "PH   LHOWAYA",
  "Ｏｎｌｙ ＳＡＧＯＭＳ", "ＳＡＧＯＭＳ", " Ｒ２　ＰＬＡＹＥＲ ❄︵²⁰", "X7 　ＰＬＡＹＥＲ", "O N L Y〆 T E A M모",
  "ᴘᴏʟɪᴄ ᴛᴇᴀᴍ ☂", "ＮＥＸＴＳＴＡＲＳ", "X! WARRING", "RD BALIRMO", "BLAK KLOVER"
];

const COLORS = [
  {n: "أحمر", c: "[FF0000]"}, {n: "أخضر", c: "[00FF00]"}, {n: "أزرق", c: "[0000FF]"},
  {n: "أصفر", c: "[FFFF00]"}, {n: "بنفسجي", c: "[FF00FF]"}, {n: "سماوي", c: "[00FFFF]"},
  {n: "برتقالي", c: "[FFA500]"}, {n: "وردي", c: "[FFC0CB]"}, {n: "أبيض", c: "[FFFFFF]"},
  {n: "أسود", c: "[000000]"}, {n: "ذهبي", c: "[FFD700]"}, {n: "رمادي", c: "[808080]"}
];

const SYMBOLS = "☮ɞ✑𖣘☁☂☀☚☛☄☃☸☯☠☢☣☆ღ♫♪♨✿❀❤❣❥❄✎❆𐓏ϟ⛇༄࿓✏✆✇☏✁✂☎︎⚙︎⚠︎⚕︎♣♧➊➑ᦂᦦდ☙Ꮼʚ❥❧❦❤𖣓";

function toggleSettings(show) {
  document.getElementById("settings-overlay").style.display = show ? "flex" : "none";
}

function cp(text, btn) {
  navigator.clipboard.writeText(text);
  const old = btn.innerHTML; btn.innerText = "تم"; btn.classList.add("done");
  setTimeout(() => { btn.innerHTML = old; btn.classList.remove("done"); }, 1000);
}

function botReply(html) {
  const chat = document.getElementById("chat");
  const row = document.createElement("div"); row.className = "row bot";
  row.innerHTML = `<div class="bubble">${html}</div>`;
  chat.appendChild(row); chat.scrollTop = chat.scrollHeight;
}

function clearChat() {
  if (confirm("هل تريد حذف الدردشة؟")) {
    document.getElementById("chat").innerHTML = "";
    showWelcome();
    state = "idle";
  }
}

function decorate(name) {
  const alpha = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
  const maps = [
    "ＡＢＣＤＥＦＧＨＩＪＫＬＭＮＯＰＱＲＳＴＵＶＷＸＹＺ",
    "ⒶⒷⒸⒹⒺⒻⒼⒽⒾⒿⓀⓁⓂⓃⓄⓅⓆⓇⓈⓉⓊⓋⓌⓍⓎⓏ",
    "🄰🄱🄲🄳🄴🄵🄶🄷🄸🄹🄺🄻🄼🄽🄾🄿🅀🅁🅂🅃🅄🅅🅆🅇🅈🅉",
    "𝐀𝐁𝐂𝐃𝐄𝐅𝐆𝐇𝐈𝐉𝐊𝐋𝐌𝐍𝐎𝐏𝐐𝐑𝐒𝐓ＵＶ𝐖𝐗𝐘𝐙",
    "𝘼𝘽𝘾𝘿𝙀𝙁𝙂𝙃𝙄𝙅𝙆𝙇𝙈𝙉𝙊𝙋𝙌𝙍𝙎𝙏𝙐𝙑𝙒𝙓𝙔𝙕",
    "𝒜𝐵𝒞𝒟𝐸𝐹𝒢𝐻𝐼𝒥𝒦𝐿𝑀𝒩𝒪𝒫𝒬𝑅𝒮𝒯𝒰𝒱𝒲𝒳𝒴𝒵",
    "𝔸𝔹ℂ𝔻𝔼𝔽𝔾ℍ𝕀𝕁𝕂𝕃𝕄ℕ𝕆ℙℚℝ𝕊𝕋𝕌𝕍𝕎𝕏𝕐ℤ",
    "ΛΉMΣDΣFGΉIJKLMПӨPQЯΣTЦVЩXYZ",
    "卂乃匚刀乇下厶卄工丁长乚M𠘨口尸㔿尺丂丅凵リ山乂丫乙",
    "αвc∂εғgнιjкℓмησpqяsтυνωxүz"
  ];

  let results = "";
  maps.forEach(m => {
    let d = "";
    for(let char of name){
      let upperChar = char.toUpperCase();
      let idx = alpha.indexOf(upperChar);
      if (idx > -1) {
        let mapArray = Array.from(m);
        d += mapArray[idx] || char;
      } else { d += char; }
    }
    if(d.trim()) {
      results += `<div class="style-row"><span>${d}</span><button class="cp" onclick="cp('${d}', this)">نسخ</button></div>`;
    }
  });
  return results;
}

function showWelcome() {
  botReply(`أهلاً بك في <b>𝑩𝑶𝑻 𝒁𝑨5𝑹𝑨𝑭𝑨</b> ✨<br>• اكتب اسمك لزخرفته<br>• رقم <b>1</b> لاسم فارغ<br>• رقم <b>2</b> للرموز المميزة<br>• رقم <b>3</b> لتلوين الأسماء<br>• رقم <b>4</b> لأسماء كلانات جاهزة<br>• رقم <b>5</b> أكواد بروفايل فري فاير`);
}

function send() {
  const inp = document.getElementById("inp");
  const val = inp.value.trim(); if (!val) return;
  
  const userRow = document.createElement("div"); userRow.className = "row user";
  userRow.innerHTML = `<div class="bubble">${val}</div>`;
  document.getElementById("chat").appendChild(userRow);
  
  if (state === "waiting_ff_choice") {
    if (val === "1") {
      let ffHtml = "";
      for (let i = 0; i < FF_CODES.length; i += 2) {
        let first = FF_CODES[i]; let second = FF_CODES[i+1];
        ffHtml += `<div style="display:flex; gap:8px;"><div class="style-row" style="flex:1;"><span>${first.f}</span><button class="cp" onclick="cp('${first.c}', this)">نسخ</button></div>`;
        if (second) ffHtml += `<div class="style-row" style="flex:1;"><span>${second.f}</span><button class="cp" onclick="cp('${second.c}', this)">نسخ</button></div>`;
        ffHtml += `</div>`;
      }
      botReply(`أكواد الأعلام:<br>${ffHtml}`);
      state = "idle";
    } else if (val === "2") {
      let normalHtml = "";
      NORMAL_CODES.forEach(item => {
        normalHtml += `<div class="style-row"><span style="font-size:0.75rem;">${item.n}</span><button class="cp" onclick="cp('${item.c}', this)">نسخ</button></div>`;
      });
      botReply(`الأكواد العادية:<br>${normalHtml}`);
      state = "idle";
    } else { botReply("يرجى اختيار 1 أو 2."); }
  } else if (state === "waiting_color_name") {
    let colorHtml = "";
    COLORS.forEach(color => {
      let hexColor = "#" + color.c.substring(1, 7);
      colorHtml += `<div class="style-row"><span style="color: ${hexColor}; font-size:0.85rem;">${val}</span><button class="cp" onclick="cp('${color.c}${val}', this)">نسخ</button></div>`;
    });
    botReply(`اسمك ملوناً:<br>${colorHtml}`);
    state = "idle";
  } else if (val === "1") {
    botReply(`الاسم فارغ:<br><div class="style-row"><span>ㅤ</span><button class="cp" onclick="cp('ㅤ', this)">نسخ</button></div>`);
  } else if (val === "2") {
    let symHtml = "";
    for(let s of SYMBOLS) { if(s.trim()) symHtml += `<button class="symbol-btn" onclick="cp('${s}', this)">${s}</button>`; }
    botReply(`الرموز المميزة:<br><div style="display:flex; flex-wrap:wrap; justify-content:center;">${symHtml}</div>`);
  } else if (val === "3") {
    state = "waiting_color_name";
    botReply("أرسل الاسم الذي تريد تلوينه...");
  } else if (val === "4") {
    let clanHtml = "";
    CLAN_NAMES.forEach(name => {
      if(name.trim()) clanHtml += `<div class="style-row"><span style="font-size:0.8rem;">${name}</span><button class="cp" onclick="cp('${name}', this)">نسخ</button></div>`;
    });
    botReply(`أسماء الكلانات:<br>${clanHtml}`);
  } else if (val === "5") {
    state = "waiting_ff_choice";
    botReply("ماذا تحتاج؟<br>1️⃣ - أكواد الأعلام<br>2️⃣ - أكواد عادية");
  } else {
    botReply(`زخرفة "${val}":<br>${decorate(val)}`);
  }
  inp.value = "";
}

window.onload = () => { showWelcome(); };
</script>
</body>
</html>
