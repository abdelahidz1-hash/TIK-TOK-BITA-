<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ＢＯＴ ＺＡＫＲＡＦＡ - زخرفة وألوان</title>
    
    <link rel="manifest" href="https://progressier.app/vII79ZQEel6BsSfkWNHK/progressier.json"/>
    <script defer src="https://progressier.app/vII79ZQEel6BsSfkWNHK/script.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-color: #00f2ff;
            --bg-color: #000;
            --surface: rgba(16, 16, 30, 0.85);
            --border: rgba(255, 255, 255, 0.1);
            --orange: #ff5c00;
            --text: #f0f0ff;
            --bot-bubble: rgba(255, 255, 255, 0.07);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; transition: background 0.3s, color 0.3s; }

        #loading-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: var(--bg-color); display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 9999; font-family: 'Cairo', sans-serif;
        }

        .loader-header img { height: 250px; width: auto; object-fit: contain; margin-bottom: 20px; }
        .loader-container { width: 85%; max-width: 400px; }
        .status-text { color: var(--primary-color); font-size: 0.9rem; font-weight: 900; }
        .progress-box { width: 100%; padding: 3px; background: rgba(255, 255, 255, 0.02); border-radius: 50px; border: 1px solid rgba(255, 255, 255, 0.05); }
        .progress-wrapper { width: 100%; height: 10px; background: #141414; border-radius: 50px; overflow: hidden; }
        .progress-bar { width: 0%; height: 100%; background: linear-gradient(90deg, #006ae6, var(--primary-color)); box-shadow: 0 0 15px rgba(0, 242, 255, 0.4); }

        #main-content {
            display: none; font-family: 'Cairo', sans-serif; 
            background: linear-gradient(rgba(0, 0, 0, 0.8), rgba(0, 0, 0, 0.8)), 
                        url('https://freefiremobile-a.akamaihd.net/common/web_event/official2.ff.garena.all/img/20228/2b22fbe56ede9d785ebed4f12a377b91.jpg');
            background-size: cover; background-position: center; background-attachment: fixed;
            color: var(--text); height: 100vh; flex-direction: column; overflow: hidden; 
        }

        .header { 
            display: flex; align-items: center; justify-content: center; padding: 16px 20px; 
            background: var(--surface); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border);
            position: relative;
        }
        
        .search-link { position: absolute; left: 20px; top: 50%; transform: translateY(-50%); width: 35px; height: 35px; cursor: pointer; }
        .search-link img { width: 100%; height: 100%; filter: invert(1); }

        .name { font-weight: 900; font-size: 1.1rem; color: #FF0000; }
        
        .chat { flex: 1; overflow-y: auto; padding: 24px 20px; display: flex; flex-direction: column; gap: 16px; }
        .row { display: flex; align-items: flex-end; gap: 10px; animation: popIn .3s ease-out both; }
        @keyframes popIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        .bubble { max-width: 95%; padding: 14px 18px; border-radius: 20px; font-size: .95rem; line-height: 1.6; }
        .row.bot .bubble { background: var(--bot-bubble); border: 1px solid rgba(255, 255, 255, 0.1); backdrop-filter: blur(8px); }
        .row.user { flex-direction: row-reverse; }
        .row.user .bubble { background: transparent; font-weight: 700; padding: 14px 0; }

        .input-area { display: flex; gap: 12px; padding: 18px 20px; background: var(--surface); border-top: 1px solid var(--border); }
        input#inp { flex: 1; background: rgba(255, 255, 255, 0.05); border: 1px solid var(--border); border-radius: 16px; padding: 14px 20px; color: var(--text); outline: none; font-family: 'Cairo'; }
        .send-btn { width: 56px; height: 56px; border-radius: 16px; border: none; background: var(--orange); color: #fff; cursor: pointer; font-size: 1.2rem;}

        .style-row { background: rgba(255, 255, 255, 0.08); border: 1px solid var(--border); border-radius: 12px; padding: 10px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .style-row span { font-size: 1rem; font-weight: bold; white-space: pre-wrap; font-family: sans-serif; }
        .cp { width: 35px; height: 35px; border-radius: 8px; border: 1px solid var(--orange); background: transparent; cursor: pointer; padding: 5px; flex-shrink: 0; }
        .cp img { width: 100%; height: 100%; filter: invert(47%) sepia(97%) saturate(2335%) hue-rotate(3deg); }
        .cp.done { border-color: #2ECC71; }
        
        .symbol-btn { width: 42px; height: 42px; margin: 4px; background: rgba(255, 255, 255, 0.05); border: 1px solid var(--orange); color: var(--text); border-radius: 10px; cursor: pointer; font-size: 1.1rem; }
    </style>
</head>
<body>

    <div id="loading-screen">
        <div class="loader-header"><img src="https://res.cloudinary.com/dpggetoyh/image/upload/v1777280345/Picsart_26-04-27_09-53-07-249_ipw3iw.png" alt="Logo"></div>
        <div class="loader-container">
            <div style="display:flex; justify-content:space-between; margin-bottom:8px;">
                <span style="color:#666; font-size:0.7rem; font-weight:900;">SYSTEM LOADING</span>
                <span class="status-text" id="percentage">0%</span>
            </div>
            <div class="progress-box"><div class="progress-wrapper"><div class="progress-bar" id="bar"></div></div></div>
        </div>
    </div>

    <div id="main-content">
        <div class="header">
            <a href="#" class="search-link">
                <img src="https://images.icon-icons.com/1511/PNG/96/searchsymbolinblackcircularbutton_104758.png" alt="Search">
            </a>
            <div class="name">ＢＯＴ ＺＡＫＲＡＦＡ</div>
        </div>
        <div class="chat" id="chat"></div>
        <div class="input-area">
          <input id="inp" type="text" placeholder="اكتب اسمك أو رقم الخيار..." maxlength="30">
          <button class="send-btn" onclick="send()">➔</button>
        </div>
    </div>

<script>
    window.addEventListener('load', () => {
        const percentElement = document.getElementById('percentage');
        const progressBar = document.getElementById('bar');
        const loader = document.getElementById('loading-screen');
        const main = document.getElementById('main-content');
        
        let progress = 0;
        const interval = setInterval(() => {
            progress += Math.floor(Math.random() * 5) + 2; 
            if (progress > 100) progress = 100;
            percentElement.innerText = `${progress}%`;
            progressBar.style.width = `${progress}%`;

            if (progress === 100) {
                clearInterval(interval);
                setTimeout(() => {
                    loader.style.display = 'none';
                    main.style.display = 'flex';
                    showWelcome();
                }, 500);
            }
        }, 30);
    });

    const alpha = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz";
    const maps = [
        "𝐀𝐁𝐂𝐃𝐄𝐅𝐆𝐇𝐈𝐉𝐊𝐋𝐌𝐍𝐎𝐏𝐐𝐑𝐒𝐓𝐔𝐕𝐖𝐗𝐘𝐙𝐚𝐛𝐜𝐝𝐞𝐟𝐠𝐡𝐢𝐣𝐤𝐥𝐦𝐧𝐨𝐩𝐪𝐫𝐬𝐭𝐮𝐯𝐰𝐱𝐲𝐳",
        "𝗔𝗕𝗖𝗗𝗘𝗙𝗚𝗛𝗜𝗝𝗞𝗟𝗠𝗡𝗢𝗣𝗤𝗥𝗦𝗧𝗨𝗩𝗪𝗫𝗬𝗭𝗮𝗯𝗰𝗱𝗲𝗳𝗴𝗵𝗶𝗷𝗸𝗹𝗺𝗻𝗼𝗽𝗾𝗿𝘀𝘁𝘂𝘃𝘄𝘅𝘆𝘇",
        "𝑨𝑩𝑪𝑫𝑬𝑭𝑮𝑯𝑰𝑱𝑲𝑳𝑴𝑵𝑶𝑷𝑸𝑹𝑺𝑻𝑼𝑽𝑾𝑿𝒀𝒁𝒂𝒃𝒄𝒅𝒆𝒇𝒈𝒉𝒊𝒋𝒌𝒍𝒎𝒏𝒐𝒑𝒒𝒓𝒔𝒕𝒖𝒗𝒘𝒙𝒚𝒛",
        "ⒶⒷⒸⒹⒺⒻⒼⒽⒾⒿⓀⓁⓂⓃⓄⓅⓆⓇⓈⓉⓊⓋⓌⓍⓎⓏⓐⓑⓒⓓⓔⓕⓖⓗⓘⓙⓚⓛⓜⓝⓞⓟⓠⓡⓢⓣⓤⓥⓦⓧⓨⓩ",
        "𝔸𝔹ℂ𝔻𝔼𝔽𝔾ℍ𝕀𝕁𝕂𝕃𝕄ℕ𝕆ℙℚℝ𝕊𝕋𝕌𝕎𝕏𝕐ℤ𝕒𝕓𝕔𝕕𝕖𝕗𝕘𝕙𝕚𝕛𝕜𝕝𝕞𝕟𝕠𝕡𝕢𝕣𝕤𝕥𝕦𝕧𝕨𝕩𝕪𝕫",
        "ＡＢＣＤＥＦＧＨＩＪＫＬＭＮＯＰＱＲＳＴＵＶＷＸＹＺａｂｃｄｅｆｇｈｉｊｋｌｍｎｏｐｑｒｓｔｕｖｗｘｙｚ"
    ];

    const blankNames = ["ㅤ", "ㅤㅤ", "ㅤㅤㅤ", "ㅤㅤㅤㅤ"];
    const symbols = "☠☂☃☁☼❆♨✎✏❤︎ッ❀࿐★↳↱⇢➯↝➸➹↬↫￫➥—─ー〜〰⩇⩉ꐑ𖣯⌕ᨒᯤᯅ𖤘𖥦⏃%𓍯𔗫𔖲𓂃﹆﹅𓄼𓄹᭣꧞𓏲𓂅꣼࿓࿔༄⌗𓈒⊹𖥔ᨵꑘᜊᦒଘ◖◗𖠗ꗃ٩ะ≛";
    const clanNames = ["ONLYㅤGOATSAㅤ??", "Only legend", "ONLYㅤGangㅤ??", "ＧＳＧ〆IＲＡQ", "７Ｒ ＴＥＡＭ"];
    const brazilianNames = ["DuXx Zz ?", "Zoom. 01x", "Universe FF?", "Junxor Zz ?"];
    const colorMap = [{ name: "أحمر", code: "FF0000", hex: "#FF0000" }, { name: "أزرق", code: "0000FF", hex: "#0000FF" }, { name: "أصفر", code: "FFFF00", hex: "#FFFF00" }];

    let colorMode = false;

    function decorate(text) {
        let out = "";
        maps.forEach((m) => {
            let res = "";
            let mArr = Array.from(m);
            for (let char of text) {
                let idx = alpha.indexOf(char);
                if (idx > -1) { res += mArr[idx]; }
                else if (alpha.indexOf(char.toUpperCase()) > -1) { res += mArr[alpha.indexOf(char.toUpperCase())]; }
                else { res += char; }
            }
            out += `<div class="style-row"><span>${res}</span><button class="cp" onclick="cp('${res}', this)"><img src="https://cdn-icons-png.flaticon.com/128/9238/9238938.png"></button></div>`;
        });
        return out;
    }

    function colorize(text) {
        let out = "";
        colorMap.forEach(c => {
            let fullCopy = `[${c.code}]${text}`;
            out += `<div class="style-row"><span style="color:${c.hex}">${text}</span><button class="cp" onclick="cp('${fullCopy}', this)"><img src="https://cdn-icons-png.flaticon.com/128/9238/9238938.png"></button></div>`;
        });
        return out;
    }

    function cp(text, btn) { 
        navigator.clipboard.writeText(text).then(() => { 
            btn.classList.add("done"); 
            setTimeout(() => btn.classList.remove("done"), 1000); 
        }); 
    }

    function botReply(html) { 
        const chat = document.getElementById("chat"); 
        const row = document.createElement("div"); 
        row.className = "row bot"; 
        row.innerHTML = `<div class="bubble">${html}</div>`; 
        chat.appendChild(row); 
        chat.scrollTop = chat.scrollHeight; 
    }

    function showWelcome() {
        botReply(`اهلا بك في ＢＯＴ ＺＡＫＲＡＦＡ ✨<br>اكتب اسمك لزخرفته أو اختر من القائمة:<br>1 - اسم فارغ<br>2 - رموز مميزة<br>3 - تلوين الإسم<br>4 - أسماء كلانات<br>5 - أسماء برازيلية`);
    }

    function send() {
        const inp = document.getElementById("inp");
        let val = inp.value.trim(); if(!val) return;
        const chat = document.getElementById("chat");
        const userRow = document.createElement("div"); userRow.className = "row user";
        userRow.innerHTML = `<div class="bubble">${val}</div>`;
        chat.appendChild(userRow);
        inp.value = "";

        if (colorMode) {
            botReply(`نتائج التلوين لـ "${val}":<br>${colorize(val)}`);
            colorMode = false;
            inp.placeholder = "اكتب اسمك أو رقم الخيار...";
        } else if(val === "1") {
            let bHtml = "الأسماء الفارغة:<br>";
            blankNames.forEach(b => bHtml += `<div class="style-row"><span>${b}</span><button class="cp" onclick="cp('${b}', this)"><img src="https://cdn-icons-png.flaticon.com/128/9238/9238938.png"></button></div>`);
            botReply(bHtml);
        } else if (val === "2") {
            let sHtml = '<div style="display: flex; flex-wrap: wrap;">';
            Array.from(symbols).forEach(s => sHtml += `<button class="symbol-btn" onclick="cp('${s}', this)">${s}</button>`);
            botReply("الرموز المميزة:<br>" + sHtml + '</div>');
        } else if (val === "3") {
            botReply("أرسل الاسم الذي تريد تلوينه الآن 🎨");
            colorMode = true;
            inp.placeholder = "أدخل الاسم هنا...";
        } else if (val === "4") {
            let cHtml = "أسماء كلانات:<br>";
            clanNames.forEach(n => cHtml += `<div class="style-row"><span>${n}</span><button class="cp" onclick="cp('${n}', this)"><img src="https://cdn-icons-png.flaticon.com/128/9238/9238938.png"></button></div>`);
            botReply(cHtml);
        } else if (val === "5") {
            let bNamesHtml = "أسماء برازيلية:<br>";
            brazilianNames.forEach(n => bNamesHtml += `<div class="style-row"><span>${n}</span><button class="cp" onclick="cp('${n}', this)"><img src="https://cdn-icons-png.flaticon.com/128/9238/9238938.png"></button></div>`);
            botReply(bNamesHtml);
        } else {
            botReply(`نتائج الزخرفة لـ "${val}":<br>${decorate(val)}`);
        }
    }
</script>
</body>
    </html>
