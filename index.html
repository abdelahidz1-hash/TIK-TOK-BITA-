<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>𝑩𝑶𝑻 𝒁𝑨5𝑹𝑨𝑭𝑨 - زخرفة أسماء وأكواد</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080810;
    --surface: rgba(16, 16, 30, 0.85);
    --card: rgba(20, 20, 42, 0.85);
    --border: rgba(255, 255, 255, 0.1);
    --orange: #ff5c00;
    --text: #f0f0ff;
    --bot-bubble: rgba(255, 255, 255, 0.07);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; transition: background 0.3s, color 0.3s; }
  
  body { 
    font-family: 'Cairo', sans-serif; 
    background: linear-gradient(rgba(0, 0, 0, 0.65), rgba(0, 0, 0, 0.65)), 
                url('https://freefiremobile-a.akamaihd.net/common/web_event/official2.ff.garena.all/img/20228/0f77bc3b090c6d61e6793f96e92d25e7.jpg');
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
    color: var(--text); 
    height: 100vh; 
    display: flex; 
    flex-direction: column; 
    overflow: hidden; 
  }

  #settings-overlay {
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(8, 8, 16, 0.98); 
    backdrop-filter: blur(15px);
    z-index: 2000;
    display: none; 
    flex-direction: column;
    align-items: center;
    justify-content: center;
    animation: fadeIn 0.3s ease;
  }

  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  .close-settings {
    position: absolute;
    top: 20px;
    right: 20px;
    background: rgba(255, 255, 255, 0.1);
    border: 1px solid var(--border);
    padding: 10px 15px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 20px;
    color: #fff;
  }

  .header { 
    display: flex; align-items: center; justify-content: space-between; 
    padding: 16px 20px; background: var(--surface); backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--border); z-index: 1001; 
  }
  
  .header-btns { display: flex; gap: 15px; align-items: center; }

  .name { 
    font-weight: 900; font-size: 1.1rem; 
    background: linear-gradient(to right, #ff5c00, #ff00fb, #007BFF, #ff5c00);
    background-size: 200% auto; -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    animation: rainbow-move 3s linear infinite;
  }
  @keyframes rainbow-move { 0% { background-position: 0% center; } 100% { background-position: 200% center; } }

  .chat { flex: 1; overflow-y: auto; padding: 24px 20px; display: flex; flex-direction: column; gap: 16px; }
  .row { display: flex; align-items: flex-end; gap: 10px; animation: popIn .3s ease-out both; }
  @keyframes popIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
  
  .row.bot { flex-direction: row; }
  .row.user { flex-direction: row-reverse; }
  
  .bubble { max-width: 95%; padding: 14px 18px; border-radius: 20px; font-size: .95rem; line-height: 1.6; }

  .row.bot .bubble { 
    background: var(--bot-bubble); 
    border: 1px solid rgba(255, 255, 255, 0.1); 
    color: var(--text); 
    backdrop-filter: blur(8px);
    box-shadow: 0 4px 15px rgba(0,0,0,0.2);
  }

  .row.user .bubble { 
    background: transparent;
    color: var(--text); 
    font-weight: 700; 
    border: none;
    padding: 14px 0;
    box-shadow: none;
  }

  .input-area { 
    display: flex; gap: 12px; padding: 18px 20px; background: var(--surface); 
    backdrop-filter: blur(15px); border-top: 1px solid var(--border); 
  }
  input#inp { 
    flex: 1; background: rgba(255, 255, 255, 0.05); border: 1px solid var(--border); 
    border-radius: 16px; padding: 14px 20px; color: var(--text); outline: none; 
    font-family: 'Cairo', sans-serif;
  }
  .send-btn { width: 56px; height: 56px; border-radius: 16px; border: none; background: var(--orange); color: #fff; cursor: pointer; font-size: 1.2rem;}

  .style-row { 
    background: rgba(255, 255, 255, 0.08); border: 1px solid var(--border); 
    border-radius: 12px; padding: 8px 12px; display: flex; 
    justify-content: space-between; align-items: center; margin-bottom: 8px;
  }

  .grid-container {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-top: 10px;
  }

  .style-row span { margin-left: 10px; font-size: 0.85rem; font-weight: bold; overflow: hidden; text-overflow: ellipsis; white-space: pre-wrap; }

  .cp { 
    display: flex; align-items: center; justify-content: center;
    width: 35px; height: 35px; border-radius: 8px; border: 1px solid var(--orange); 
    background: transparent; cursor: pointer; padding: 5px; flex-shrink: 0;
  }
  .cp img { width: 100%; height: 100%; filter: invert(47%) sepia(97%) saturate(2335%) hue-rotate(3deg) brightness(101%) contrast(105%); }
  
  .cp.done { border-color: #2ECC71; }
  .cp.done img { filter: invert(65%) sepia(35%) saturate(735%) hue-rotate(97deg) brightness(96%) contrast(92%); }

  .symbol-btn {
    width: 42px; height: 42px; display: flex; align-items: center; justify-content: center;
    font-size: 1.1rem; margin: 4px; background: rgba(255, 255, 255, 0.05);
    border: 1px solid var(--orange); color: var(--text); border-radius: 10px; cursor: pointer;
  }

  .nav-btn { background:none; border:none; cursor:pointer; display: flex; align-items: center; opacity: 0.8; padding: 5px;}
  .nav-btn img { width: 26px; height: 26px; object-fit: contain; }
</style>
</head>
<body>

<div id="settings-overlay">
  <button class="close-settings" onclick="toggleSettings(false)">✕</button>
  <div class="settings-content">
    <div style="color: var(--orange); font-weight: 900; font-size: 1.5rem; margin-bottom: 10px;">الإعدادات</div>
    <p style="color: #aaa; margin-top: 10px;">هذه الواجهة قيد التطوير حالياً ⚙️</p>
  </div>
</div>

<div class="header">
  <div class="name">𝑩𝑶𝑻 𝒁𝑨5𝑹𝑨𝑭𝑨</div>
  <div class="header-btns">
    <button class="nav-btn" onclick="location.reload()">
      <img src="https://images.icon-icons.com/933/PNG/96/rotate-to-right-button_icon-icons.com_72597.png" alt="Refresh">
    </button>
    <a href="https://tiktok.com/@abdelahi.ff.dz.17" target="_blank" class="nav-btn">
      <img src="https://images.icon-icons.com/2992/PNG/96/tiktok_logo_icon_187324.png" alt="TikTok">
    </a>
    <button class="nav-btn" onclick="clearChat()">
      <img src="https://cdn-icons-png.flaticon.com/128/3334/3334345.png" alt="Delete">
    </button>
    <button class="nav-btn" onclick="toggleSettings(true)">
      <img src="https://cdn-icons-png.flaticon.com/128/18976/18976235.png" alt="Settings">
    </button>
  </div>
</div>

<div class="chat" id="chat"></div>

<div class="input-area">
  <input id="inp" type="text" placeholder="اكتب اسمك أو رقم الخيار..." maxlength="30">
  <button class="send-btn" onclick="send()">➔</button>
</div>

<script>
let state = "idle";
const COPY_ICON = "https://cdn-icons-png.flaticon.com/128/9238/9238938.png";

const FF_CODES = [
  { f: "🇩🇿", c: "[b][008000]█[FFFFFF]█[CC0000]█ ALGERIA ❤️" },
  { f: "🇹🇳", c: "[b][CC0000]█[FFFFFF]🇹🇳[CC0000]█ TUNISIA ❤️" },
  { f: "🇵🇸", c: "[b][000000]█[008000]█[FFFFFF]█[CC0000] PALESTINE" },
  { f: "🇲🇦", c: "[b][CC0000]█[00FF33]★[CC0000]█ MOROCCO 🇲🇦" },
  { f: "🇸🇾", c: "[b][FF0000]█[FFFFFF]█[000000]█ SYRIA [00FF00]★★" },
  { f: "🇯🇴", c: "[b][CC0000]★[000000]█[FFFFFF]█[008000]█ JORDAN 🇯🇴" },
  { f: "🇱🇾", c: "[b][000000]█[FF0000]█[008000]█ LIBYA" },
  { f: "🇲🇷", c: "[b][008000]█[FFFF00]☪[008000]█ MAURITANIA" },
  { f: "🇸🇦", c: "[008000]█[FFFFFF]⚔️[008000]█ KSA" },
  { f: "🇪🇬", c: "[b][FF0000]█[FFFFFF]█[000000]█ EGYPT" },
  { f: "🇮🇶", c: "[b][FF0000]█[FFFFFF]الله أكبر[000000]█ IRAQ" },
  { f: "🇦🇪", c: "[FF0000]█[008000]█[FFFFFF]█[000000]█ UAE" },
  { f: "🇰🇼", c: "[b][000000]█[008000]█[FFFFFF]█[FF0000]█ KUWAIT" }
];

const NORMAL_CODES = [
  { n: "كود المنزل", c: "[B][C]╱◥██████◣\n[7F00FF]│∩│▤│▤│▤\n▓▓▓▓▓▓▓▓▓" },
  { n: "كود التدخين", c: "[b][6D7B8B]ᝰ[FFFFFF]▄▄▄▄▄▄[FFA000]▄▄▄\nGOLD FLAKE" },
  { n: "كود الحب", c: "[FF0200]♥[FFFFFF]● ● \n/█\\/▓\\[FF0200]Ｉ LOVE U" },
  { n: "كود BUS", c: "[B][C][00FFFF]╭━┳━┳━━┳━╮\n│──── BUS ┃□│\n╰◉─◉─━──◉╯" },
  { n: "كود القلب", c: "[b][c][FF0000]✿\n[00FF00]᭄⸙  I ❤️ I LOVE YOU" }
];

const CLAN_NAMES = [
  "ONLYㅤGOATSAㅤ??", "Only legend", "ONLYㅤGangㅤ??", "!ᴿᴱˣㅤBRAZIL", "ＩＱᅠ〆 T E A M",
  "AD | SUPER Primeﾠﾠ〆 28", "Z  𓆩KAFN𓆪 ˣ", "𓆩O N L Y𓆪 〆9 A L 3 T", "WOLF TENX", "ＪＯＲＤＡＮ"
];

const COLORS = [
  {n: "أحمر", c: "[FF0000]", h: "#FF0000"}, {n: "أخضر", c: "[00FF00]", h: "#00FF00"}, 
  {n: "أزرق", c: "[0000FF]", h: "#0000FF"}, {n: "أصفر", c: "[FFFF00]", h: "#FFFF00"}, 
  {n: "بنفسجي", c: "[FF00FF]", h: "#FF00FF"}, {n: "سماوي", c: "[00FFFF]", h: "#00FFFF"}, 
  {n: "أبيض", c: "[FFFFFF]", h: "#FFFFFF"}, {n: "ذهبي", c: "[FFD700]", h: "#FFD700"}
];

const SYMBOLS = "☮ɞ✑𖣘☁☂☀☚☛☄☃☸☯☠☢☣☆ღ♫♪♨✿❀❤❣❥❄✎❆ϟ⛇༄࿓✏✁✂☎︎⚙︎⚠︎⚕︎♣♧➊➑ᦂᦦد❥❧❦❤𖣓";

function toggleSettings(show) {
  document.getElementById("settings-overlay").style.display = show ? "flex" : "none";
}

function cp(text, btn) {
  navigator.clipboard.writeText(text).then(() => {
    btn.classList.add("done");
    setTimeout(() => { btn.classList.remove("done"); }, 1000);
  });
}

function botReply(html) {
  const chat = document.getElementById("chat");
  const row = document.createElement("div"); row.className = "row bot";
  row.innerHTML = `<div class="bubble">${html}</div>`;
  chat.appendChild(row); chat.scrollTop = chat.scrollHeight;
}

function clearChat() {
  if (confirm("هل تريد حذف الدردشة؟")) {
    document.getElementById("chat").innerHTML = "";
    showWelcome();
    state = "idle";
  }
}

function decorate(name) {
  const alpha = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
  const maps = [
    "ＡＢＣＤＥＦＧＨＩＪＫＬＭＮＯＰＱＲＳＴＵＶＷＸＹＺ",
    "Ⓐ⒒ⒸⒹⒺⒻⒼⒽⒾⒿⓀⓁⓂⓃⓄⓅⓆⓇⓈⓉⓊⓋⓌⓍⓎⓏ",
    "𝐀𝐁𝐂𝐃𝐄𝐅𝐆𝐇𝐈𝐉𝐊𝐋𝐌𝐍𝐎𝐏𝐐𝐑𝐒ＴＵＶＷＸＹ𝐙",
    "αвc∂εғgнιjкℓмησpqяsтυνωxүz"
  ];

  let results = "";
  maps.forEach(m => {
    let d = "";
    for(let char of name){
      let idx = alpha.indexOf(char.toUpperCase());
      d += (idx > -1) ? Array.from(m)[idx] : char;
    }
    results += `<div class="style-row"><span>${d}</span><button class="cp" onclick="cp('${d}', this)"><img src="${COPY_ICON}"></button></div>`;
  });
  return results;
}

function showWelcome() {
  botReply(`أهلاً بك في <b>𝑩𝑶𝑻 𝒁𝑨5𝑹𝑨𝑭𝑨</b> ✨<br>
  • اكتب اسمك للزخرفة<br>
  • رقم ❶ اسم فارغ<br>
  • رقم ➋ رموز مميزة<br>
  • رقم ➌ تلوين الاسماء<br>
  • رقم ➍ اسماء كلانات<br>
  • رقم ➎ أكواد فري فاير`);
}

function send() {
  const inp = document.getElementById("inp");
  let val = inp.value.trim(); if (!val) return;
  
  const toCircleNumbers = (text) => {
    return text.replace(/1/g, "❶").replace(/2/g, "➋").replace(/3/g, "➌").replace(/4/g, "➍").replace(/5/g, "➎");
  };

  const normalizedVal = val.replace(/❶/g, "1").replace(/➋/g, "2").replace(/➌/g, "3").replace(/➍/g, "4").replace(/➎/g, "5");

  const chat = document.getElementById("chat");
  const userRow = document.createElement("div"); userRow.className = "row user";
  userRow.innerHTML = `<div class="bubble">${toCircleNumbers(val)}</div>`;
  chat.appendChild(userRow);
  
  if (state === "waiting_ff_choice") {
    if (normalizedVal === "1") {
      let ffHtml = `<div class="grid-container">`;
      FF_CODES.forEach(item => {
        ffHtml += `<div class="style-row"><span>${item.f}</span><button class="cp" onclick="cp('${item.c}', this)"><img src="${COPY_ICON}"></button></div>`;
      });
      ffHtml += `</div>`;
      botReply(`أكواد الأعلام:<br>${ffHtml}`); state = "idle";
    } else if (normalizedVal === "2") {
      let nHtml = "";
      NORMAL_CODES.forEach(item => {
        nHtml += `<div class="style-row"><span>${item.n}</span><button class="cp" onclick="cp('${item.c}', this)"><img src="${COPY_ICON}"></button></div>`;
      });
      botReply(`الأكواد العادية:<br>${nHtml}`); state = "idle";
    }
  } else if (state === "waiting_color_name") {
    let cHtml = "";
    COLORS.forEach(c => {
      cHtml += `<div class="style-row"><span style="color: ${c.h};">${val}</span><button class="cp" onclick="cp('${c.c}${val}', this)"><img src="${COPY_ICON}"></button></div>`;
    });
    botReply(`اسمك بالألوان (انسخ الكود جاهزاً):<br>${cHtml}`); state = "idle";
  } else if (normalizedVal === "1") {
    botReply(`<div class="style-row"><span>اسم فارغ</span><button class="cp" onclick="cp('ㅤ', this)"><img src="${COPY_ICON}"></button></div>`);
  } else if (normalizedVal === "2") {
    let sHtml = "";
    for(let s of SYMBOLS) sHtml += `<button class="symbol-btn" onclick="cp('${s}', this)">${s}</button>`;
    botReply(`<div style="display:flex; flex-wrap:wrap; justify-content:center;">${sHtml}</div>`);
  } else if (normalizedVal === "3") {
    state = "waiting_color_name"; botReply("أرسل الاسم الذي تريد تلوينه...");
  } else if (normalizedVal === "4") {
    let clHtml = "";
    CLAN_NAMES.forEach(n => {
      clHtml += `<div class="style-row"><span>${n}</span><button class="cp" onclick="cp('${n}', this)"><img src="${COPY_ICON}"></button></div>`;
    });
    botReply(`أسماء الكلانات:<br>${clHtml}`);
  } else if (normalizedVal === "5") {
    state = "waiting_ff_choice"; botReply("❶ - أكواد الأعلام<br>➋ - أكواد عادية");
  } else {
    botReply(`زخرفة "${val}":<br>${decorate(val)}`);
  }
  inp.value = "";
  chat.scrollTop = chat.scrollHeight;
}

window.onload = showWelcome;
document.getElementById("inp").addEventListener("keypress", (e) => { if(e.key === "Enter") send(); });
</script>
</body>
</html>
