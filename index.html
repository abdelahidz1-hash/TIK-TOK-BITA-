<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>𝑩𝑶𝑻 𝒁𝑨5𝑹𝑨𝑭𝑨</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --orange: #ff5c00;
            --text: #f0f0ff;
        }

        body { 
            margin: 0; height: 100vh; display: flex; justify-content: center; align-items: center; 
            font-family: 'Cairo', sans-serif; overflow: hidden; background: #000; 
        }
        
        /* طبقات الخلفية */
        .bg-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }
        
        #bg-login { 
            background-image: url('https://freefiremobile-a.akamaihd.net/common/web_event/official2.ff.garena.all/img/20228/2b22fbe56ede9d785ebed4f12a377b91.jpg');
            background-size: cover; background-position: center; filter: brightness(0.6); 
        }

        #bg-main { 
            display: none;
            background-image: url('https://freefiremobile-a.akamaihd.net/common/web_event/official2.ff.garena.all/img/20228/2c7002c23451f600062f42ce7e7a9815.jpg');
            background-size: cover; background-position: center;
        }

        /* لودر البداية */
        #loader-container { text-align: center; z-index: 20; width: 80%; max-width: 350px; }
        .progress-wrapper {
            width: 100%; height: 12px; background: rgba(255, 255, 255, 0.1);
            border-radius: 10px; overflow: hidden; border: 1px solid rgba(255, 255, 255, 0.2);
        }
        #progress-fill {
            height: 100%; width: 0%; background: linear-gradient(90deg, #ff0000, #ff7b00);
            box-shadow: 0 0 15px #ff4500; transition: width 0.1s linear;
        }
        .loading-text { color: #fff; margin-bottom: 8px; font-weight: 700; font-size: 14px; }

        /* اللوحة الزجاجية للدخول */
        .glass-panel {
            width: 240px; 
            background: rgba(255, 255, 255, 0.12);
            border: 1.2px solid rgba(255, 255, 255, 0.4); 
            border-radius: 25px; 
            text-align: center; 
            padding: 25px 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
        }

        .login-title { color: #fff; font-size: 16px; margin-bottom: 15px; font-weight: 900; }
        
        .google-btn {
            background: #fff; width: 30px; height: 30px; border-radius: 50%; 
            border: 1.5px solid #000; cursor: pointer; display: flex; 
            align-items: center; justify-content: center; margin: 0 auto 10px auto; 
            transition: all 0.3s ease; box-sizing: border-box;
        }
        .google-btn img { width: 16px; height: 16px; }

        .or-text { color: #fff; font-size: 10px; margin: 10px 0; opacity: 0.8; display: block; position: relative; }
        .or-text::before, .or-text::after { content: ""; position: absolute; top: 50%; width: 25%; height: 1px; background: rgba(255,255,255,0.2); }
        .or-text::before { left: 5px; } .or-text::after { right: 5px; }

        .input-group { display: flex; flex-direction: column; gap: 8px; }
        .input-field {
            background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px; padding: 8px; color: #fff; font-family: 'Cairo', sans-serif;
            font-size: 12px; outline: none; text-align: center;
        }
        .login-submit {
            background: linear-gradient(90deg, #ff0000, #ff7b00); border: none;
            border-radius: 8px; color: white; padding: 8px; cursor: pointer;
            font-size: 12px; font-weight: bold; font-family: 'Cairo', sans-serif; margin-top: 5px;
        }

        /* واجهة المستخدم والأزرار */
        #main-interface { display: none; width: 100%; height: 100%; position: relative; }
        
        .header-buttons {
            position: absolute; top: 20px; right: 20px; 
            display: flex; gap: 12px; align-items: center;
            z-index: 10;
        }

        .action-btn {
            width: 42px; height: 42px; border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid #fff; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            backdrop-filter: blur(5px); transition: transform 0.3s, border-color 0.3s;
        }
        .action-btn:hover { transform: scale(1.1); border-color: #ff7b00; }
        .action-btn img { width: 60%; height: 60%; object-fit: contain; }
        .account-btn-img { width: 100% !important; height: 100% !important; object-fit: cover !important; }

        /* لافته الحساب (Pop-up) */
        #account-modal {
            display: none; position: fixed; top: 75px; right: 20px; 
            background: rgba(0, 0, 0, 0.9); border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 15px; padding: 15px; width: 200px;
            color: #fff; z-index: 100; text-align: right;
            backdrop-filter: blur(10px); box-shadow: 0 10px 25px rgba(0,0,0,0.6);
        }
        .modal-info { font-size: 13px; margin-bottom: 5px; word-wrap: break-word; }
        .modal-label { font-size: 10px; color: #aaa; }

        /* قسم الإعجاب */
        .like-section {
            margin-top: 15px; border-top: 1px solid rgba(255,255,255,0.1);
            padding-top: 10px; text-align: center;
        }
        .like-click-area { cursor: pointer; transition: transform 0.2s; }
        .like-click-area:active { transform: scale(0.9); }
        .large-like-icon { width: 35px; height: 35px; margin-bottom: 5px; }
        .like-count { font-size: 11px; color: #ff7b00; display: block; margin-top: 2px; }
    </style>
</head>
<body>

    <div id="bg-login" class="bg-layer"></div>
    <div id="bg-main" class="bg-layer"></div>

    <div id="loader-container">
        <div class="loading-text">جاري التحميل... <span id="percentage">0%</span></div>
        <div class="progress-wrapper" onclick="speedUp()">
            <div id="progress-fill"></div>
        </div>
    </div>

    <div id="login-interface" class="glass-panel" style="display: none;">
        <div class="login-title">تسجيل الدخول</div>
        <button class="google-btn" onclick="loginWithGoogle()" title="الدخول عبر جوجل">
            <img src="https://cdn-icons-png.flaticon.com/128/300/300221.png" alt="google">
        </button>
        <span class="or-text">أو يدويًا</span>
        <div class="input-group">
            <input type="text" class="input-field" placeholder="اسم المستخدم" id="username">
            <input type="password" class="input-field" placeholder="كلمة المرور" id="password">
            <button class="login-submit" onclick="manualLogin()">دخول</button>
        </div>
    </div>

    <div id="main-interface">
        <div class="header-buttons">
            <button class="action-btn" onclick="window.open('https://abdelahidz1-hash.github.io/BOT-ZA5RAFA-2/', '_blank')">
                <img src="https://cdn-icons-png.flaticon.com/128/20/20820.png" alt="Link Icon">
            </button>
            
            <button class="action-btn" onclick="toggleModal()">
                <img src="https://cdn-icons-png.flaticon.com/128/4120/4120345.png" class="account-btn-img" id="userAvatar" alt="user">
            </button>
        </div>

        <div id="account-modal">
            <div class="modal-label">الاسم:</div>
            <div id="displayName" class="modal-info">---</div>
            <div class="modal-label">الحساب:</div>
            <div id="displayEmail" class="modal-info">---</div>
            
            <div class="like-section">
                <div class="like-click-area" onclick="addLike()">
                    <img src="https://cdn-icons-png.flaticon.com/128/12096/12096301.png" class="large-like-icon" alt="Like">
                    <p style="color: white; margin: 0; font-size: 12px;">أعجبني 👍</p>
                    <span id="totalLikes" class="like-count">تحميل الإعجابات...</span>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getDatabase, ref, set, runTransaction, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD8FB2radBFN7NVC4JUX_JAjUk93glXfDo",
            authDomain: "bot-za5rafa.firebaseapp.com",
            databaseURL: "https://bot-za5rafa-default-rtdb.firebaseio.com",
            projectId: "bot-za5rafa",
            storageBucket: "bot-za5rafa.firebasestorage.app",
            messagingSenderId: "747795672156",
            appId: "1:747795672156:web:938283330b06a7b0f6ca99",
            measurementId: "G-7BBZ0JLECB"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const database = getDatabase(app);
        const provider = new GoogleAuthProvider();
        const likesRef = ref(database, 'globalLikes');

        onValue(likesRef, (snapshot) => {
            const count = snapshot.val() || 0;
            document.getElementById('totalLikes').innerText = count + " إعجاب";
        });

        window.loginWithGoogle = function() {
            signInWithPopup(auth, provider).then((result) => {
                const user = result.user;
                set(ref(database, 'users/' + user.uid), {
                    name: user.displayName,
                    email: user.email,
                    lastSeen: new Date().toISOString()
                });
                showMain(user.displayName, user.email, user.photoURL);
            }).catch(err => alert("فشل الدخول: " + err.message));
        }

        window.manualLogin = function() {
            const user = document.getElementById('username').value;
            if(user && document.getElementById('password').value) {
                showMain(user, "تسجيل يدوي", null);
            } else {
                alert("يرجى إدخال البيانات");
            }
        }

        window.addLike = function() {
            if (!localStorage.getItem('userLikedBot')) {
                runTransaction(likesRef, (currentValue) => {
                    return (currentValue || 0) + 1;
                });
                localStorage.setItem('userLikedBot', 'true');
                alert("شكراً لإعجابك!");
            } else {
                alert("لقد قمت بالإعجاب مسبقاً!");
            }
        }

        function showMain(name, email, photo) {
            document.getElementById('login-interface').style.display = 'none';
            document.getElementById('bg-login').style.display = 'none';
            document.getElementById('bg-main').style.display = 'block';
            document.getElementById('main-interface').style.display = 'block';
            
            document.getElementById('displayName').innerText = name;
            document.getElementById('displayEmail').innerText = email;
            if(photo) document.getElementById('userAvatar').src = photo;
        }

        window.toggleModal = function() {
            const modal = document.getElementById('account-modal');
            modal.style.display = (modal.style.display === 'block') ? 'none' : 'block';
        }
    </script>

    <script>
        let progress = 0;
        let timer = setInterval(() => {
            if (progress >= 100) {
                clearInterval(timer);
                document.getElementById('loader-container').style.display = 'none';
                document.getElementById('login-interface').style.display = 'block';
            } else {
                progress++;
                document.getElementById('progress-fill').style.width = progress + '%';
                document.getElementById('percentage').innerText = progress + '%';
            }
        }, 20);
        function speedUp() { progress += 20; if(progress > 100) progress = 100; }
    </script>
</body>
</html>
