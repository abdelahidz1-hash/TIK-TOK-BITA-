<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>рқ‘©рқ‘¶рқ‘» рқ’Ғрқ‘Ё5рқ‘№рқ‘Ёрқ‘ӯрқ‘Ё - ШІШ®ШұЩҒШ© ЩҲШЈЩ„ЩҲШ§ЩҶ</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        /* ШҘШ№ШҜШ§ШҜШ§ШӘ Ш§Щ„ШҙШ§ШҙШ© Ш§Щ„Щ…ШҙШӘШұЩғШ© */
        :root {
            --primary-color: #00f2ff;
            --bg-color: #0a0a0a;
            --bg: #080810;
            --surface: rgba(16, 16, 30, 0.85);
            --card: rgba(20, 20, 42, 0.85);
            --border: rgba(255, 255, 255, 0.1);
            --orange: #ff5c00;
            --text: #f0f0ff;
            --bot-bubble: rgba(255, 255, 255, 0.07);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; transition: background 0.3s, color 0.3s; }

        /* --- ШӘЩҶШіЩҠЩӮ ШҙШ§ШҙШ© Ш§Щ„ШӘШӯЩ…ЩҠЩ„ --- */
        #loading-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: var(--bg-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            font-family: 'Cairo', sans-serif;
        }

        .loader-header img { height: 300px; width: auto; object-fit: contain; margin-bottom: 20px; }

        .loader-container { width: 85%; max-width: 400px; }

        .info-panel { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 8px; padding: 0 5px; }

        .status-text { color: var(--primary-color); font-size: 0.9rem; text-shadow: 0 0 10px rgba(0, 242, 255, 0.3); }

        .loading-label { color: #666; font-size: 0.65rem; letter-spacing: 1px; text-transform: uppercase; font-weight: 900; }

        .progress-box { width: 100%; padding: 3px; background: rgba(255, 255, 255, 0.02); border-radius: 50px; border: 1px solid rgba(255, 255, 255, 0.05); }

        .progress-wrapper { width: 100%; height: 8px; background: #141414; border-radius: 50px; overflow: hidden; position: relative; }

        .progress-bar { width: 0%; height: 100%; background: linear-gradient(90deg, #006ae6, var(--primary-color)); border-radius: 50px; box-shadow: 0 0 15px rgba(0, 242, 255, 0.4); animation: fillProgress 30s linear forwards; position: relative; }

        .progress-bar::after { content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent); animation: scan 2s infinite; }

        @keyframes fillProgress { 0% { width: 0%; } 100% { width: 100%; } }
        @keyframes scan { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }

        /* --- ШӘЩҶШіЩҠЩӮ ЩҲШ§Ш¬ЩҮШ© Ш§Щ„ШЁЩҲШӘ (Щ…Ш®ЩҒЩҠШ© ЩҒЩҠ Ш§Щ„ШЁШҜШ§ЩҠШ©) --- */
        #main-content {
            display: none; /* Щ…Ш®ЩҒЩҠ ШӯШӘЩү ЩҠЩҶШӘЩҮЩҠ Ш§Щ„ШӘШӯЩ…ЩҠЩ„ */
            font-family: 'Cairo', sans-serif; 
            background: linear-gradient(rgba(0, 0, 0, 0.65), rgba(0, 0, 0, 0.65)), 
                        url('https://freefiremobile-a.akamaihd.net/common/web_event/official2.ff.garena.all/img/20228/2b22fbe56ede9d785ebed4f12a377b91.jpg');
            background-size: cover; background-position: center; background-attachment: fixed;
            color: var(--text); height: 100vh; flex-direction: column; overflow: hidden; 
        }

        .header { display: flex; align-items: center; justify-content: center; padding: 16px 20px; background: var(--surface); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border); z-index: 1001; }
        .name { font-weight: 900; font-size: 1.1rem; background: linear-gradient(to right, #ff5c00, #ff00fb, #007BFF, #ff5c00); background-size: 200% auto; -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: rainbow-move 3s linear infinite; }
        @keyframes rainbow-move { 0% { background-position: 0% center; } 100% { background-position: 200% center; } }
        .chat { flex: 1; overflow-y: auto; padding: 24px 20px; display: flex; flex-direction: column; gap: 16px; }
        .row { display: flex; align-items: flex-end; gap: 10px; animation: popIn .3s ease-out both; }
        @keyframes popIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        .row.bot { flex-direction: row; }
        .row.user { flex-direction: row-reverse; }
        .bubble { max-width: 95%; padding: 14px 18px; border-radius: 20px; font-size: .95rem; line-height: 1.6; }
        .row.bot .bubble { background: var(--bot-bubble); border: 1px solid rgba(255, 255, 255, 0.1); color: var(--text); backdrop-filter: blur(8px); box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .row.user .bubble { background: transparent; color: var(--text); font-weight: 700; border: none; padding: 14px 0; box-shadow: none; }
        .input-area { display: flex; gap: 12px; padding: 18px 20px; background: var(--surface); backdrop-filter: blur(15px); border-top: 1px solid var(--border); }
        input#inp { flex: 1; background: rgba(255, 255, 255, 0.05); border: 1px solid var(--border); border-radius: 16px; padding: 14px 20px; color: var(--text); outline: none; font-family: 'Cairo', sans-serif; }
        .send-btn { width: 56px; height: 56px; border-radius: 16px; border: none; background: var(--orange); color: #fff; cursor: pointer; font-size: 1.2rem;}
        .style-row { background: rgba(255, 255, 255, 0.08); border: 1px solid var(--border); border-radius: 12px; padding: 8px 12px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .style-row span { margin-left: 10px; font-size: 0.85rem; font-weight: bold; overflow: hidden; text-overflow: ellipsis; white-space: pre-wrap; }
        .cp { display: flex; align-items: center; justify-content: center; width: 35px; height: 35px; border-radius: 8px; border: 1px solid var(--orange); background: transparent; cursor: pointer; padding: 5px; flex-shrink: 0; }
        .cp img { width: 100%; height: 100%; filter: invert(47%) sepia(97%) saturate(2335%) hue-rotate(3deg) brightness(101%) contrast(105%); }
        .cp.done { border-color: #2ECC71; }
        .cp.done img { filter: invert(65%) sepia(35%) saturate(735%) hue-rotate(97deg) brightness(96%) contrast(92%); }
        .symbol-btn { width: 42px; height: 42px; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; margin: 4px; background: rgba(255, 255, 255, 0.05); border: 1px solid var(--orange); color: var(--text); border-radius: 10px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="loading-screen">
        <div class="loader-header">
            <img src="https://res.cloudinary.com/dpggetoyh/image/upload/v1777280345/Picsart_26-04-27_09-53-07-249_ipw3iw.png" alt="Loading Logo">
        </div>
        <div class="loader-container">
            <div class="info-panel">
                <span class="loading-label">System Loading</span>
                <span class="status-text" id="percentage">0%</span>
            </div>
            <div class="progress-box">
                <div class="progress-wrapper">
                    <div class="progress-bar"></div>
                </div>
            </div>
        </div>
    </div>

    <div id="main-content">
        <div class="header">
          <div class="name">рқ‘©рқ‘¶рқ‘» рқ’Ғрқ‘Ё5рқ‘№рқ‘Ёрқ‘ӯрқ‘Ё</div>
        </div>
        <div class="chat" id="chat"></div>
        <div class="input-area">
          <input id="inp" type="text" placeholder="Ш§ЩғШӘШЁ Ш§ШіЩ…Щғ ШЈЩҲ ШұЩӮЩ… Ш§Щ„Ш®ЩҠШ§Шұ..." maxlength="30">
          <button class="send-btn" onclick="send()">вһ”</button>
        </div>
    </div>

<script>
    // --- ШіЩғШұЩҠШЁШӘ Ш§Щ„ШӘШӯЩғЩ… ЩҒЩҠ Ш§Щ„ШӘШӯЩ…ЩҠЩ„ ---
    const percentElement = document.getElementById('percentage');
    const loadingScreen = document.getElementById('loading-screen');
    const mainContent = document.getElementById('main-content');
    let current = 0;
    const totalDuration = 30000; // 30 Ш«Ш§ЩҶЩҠШ©
    const step = totalDuration / 100;

    const timer = setInterval(() => {
        current++;
        percentElement.innerText = `${current}%`;
        
        if (current >= 100) {
            clearInterval(timer);
            // ШҘШ®ЩҒШ§ШЎ ШҙШ§ШҙШ© Ш§Щ„ШӘШӯЩ…ЩҠЩ„ ЩҲШҘШёЩҮШ§Шұ Ш§Щ„ШЁЩҲШӘ
            loadingScreen.style.display = 'none';
            mainContent.style.display = 'flex';
            showWelcome(); // ШӘШҙШәЩҠЩ„ ШұШіШ§Щ„Ш© Ш§Щ„ШӘШұШӯЩҠШЁ Ш§Щ„Ш®Ш§ШөШ© ШЁШ§Щ„ШЁЩҲШӘ
        }
    }, step);

    // --- ШіЩғШұЩҠШЁШӘ Ш§Щ„ШЁЩҲШӘ Ш§Щ„ШЈШөЩ„ЩҠ ---
    let state = "idle";
    const COPY_ICON = "https://cdn-icons-png.flaticon.com/128/9238/9238938.png";
    const CLAN_NAMES = ["ONLYг…ӨGOATSAг…Ө??", "Only legend", "ONLYг…ӨGangг…Ө??", "!бҙҝбҙұЛЈг…ӨBRAZIL", "пј©пјұб… гҖҶ T E A M", "AD | SUPER Primeпҫ пҫ гҖҶ 28", "Z  р“Ҷ©KAFNр“ҶӘ ЛЈ", "р“Ҷ©O N T Yр“ҶӘ гҖҶ9 A L 3 T", "WOLF TENX", "пјӘпјҜпјІпјӨпјЎпј®"];
    const EXTENDED_COLORS = ["#000000","#ff3d00","#991b1b","#2dd4bf","#080808","#ff1744","#b91c1c","#2e1065","#121212","#ff007f","#dc2626","#4c1d95","#1a1a1a","#ff00ff","#ef4444","#5b21b6","#212121","#d500f9","#f87171","#6d28d9","#2c2c2c","#bc13fe","#fca5a5","#7c3aed","#333333","#6200ea","#fecaca","#8b5cf6","#424242","#304ffe","#fee2e2","#a78bfa","#555555","#2979ff","#831843","#c4b5fd","#666666","#00b0ff","#9d174d","#ddd6fe","#757575","#00e676","#be185d","#ede9fe","#888888","#1de9b6","#db2777","#422006","#9e9e9e","#00bfa5","#ec4899","#713f12","#bdbdbd","#0a192f","#f472b6","#854d0e","#d1d5db","#172a45","#064e3b","#a16207","#e0e0e0","#303c55","#065f46","#ca8a04","#eeeeee","#112240","#047857","#eab308","#f5f5f5","#1f2937","#059669","#facc15","#fafafa","#374151","#10b981","#fde047","#ffffff","#1e3a8a","#34d399","#fef08a","#00f3ff","#1d4ed8","#6ee7b7","#fefce8","#00e5ff","#2563eb","#a7f3d0","#7c2d12","#39ff14","#3b82f6","#d1fae5","#9a3412","#ccff00","#60a5fa","#ecfdf5","#c2410c","#ffff00","#93c5fd","#134e4a","#ea580c","#ffea00","#bfdbfe","#115e59","#f97316","#ffc107","#dbeafe","#0f766e","#fb923c","#ff9800","#450a0a","#0d9488","#ff5722","#7f1d1d","#14b8a6"];
    const SYMBOLS = "вҳ®Йһвң‘р–ЈҳвҳҒвҳӮвҳҖвҳҡвҳӣвҳ„вҳғвҳёвҳҜвҳ вҳўвҳЈвҳҶбғҰвҷ«вҷӘвҷЁвңҝвқҖвқӨвқЈвқҘвқ„вңҺвқҶПҹвӣҮај„аҝ“вңҸвңҒвңӮвҳҺпёҺвҡҷпёҺвҡ пёҺвҡ•пёҺвҷЈвҷ§вһҠвһ‘бҰӮбҰҰШҜвқҘвқ§вқҰвқӨр–Ј“";

    function cp(text, btn) { navigator.clipboard.writeText(text).then(() => { btn.classList.add("done"); setTimeout(() => { btn.classList.remove("done"); }, 1000); }); }
    function botReply(html) { const chat = document.getElementById("chat"); const row = document.createElement("div"); row.className = "row bot"; row.innerHTML = `<div class="bubble">${html}</div>`; chat.appendChild(row); chat.scrollTop = chat.scrollHeight; }
    function decorate(name) { const alpha = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz"; const maps = ["рқҗҖрқҗҒрқҗӮрқҗғрқҗ„рқҗ…рқҗҶрқҗҮрқҗҲрқҗүрқҗҠрқҗӢрқҗҢрқҗҚрқҗҺрқҗҸпјұрқҗ‘рқҗ’пјҙпјөпј¶рқҗ–рқҗ—рқҗҳрқҗҷрқҗҡрқҗӣрқҗңрқҗқрқҗһрқҗҹрқҗ рқҗЎрқҗўрқҗЈрқҗӨрқҗҘрқҗҰрқҗ§рқҗЁрқҗ©рқҗӘрқҗ«рқҗ¬рқҗӯрқҗ®рқҗҜпҪ—рқҗұрқҗІрқҗі","рқ—”рқ—•рқ—–рқ——рқ—ҳрқ—ҷрқ—ҡрқ—ӣрқ—ңрқ—қрқ—һрқҗӢрқ— рқ—Ўрқ—ўрқ—Јрқ—Өрқ—Ҙрқ—Ұрқ—§рқ—ЁжҜ”рқ—Әрқ—«рқ—¬рқ—ӯрқ—®рқ—Ҝрқ—°рқ—ұрқ—Ірқ—ірқ—ҙрқ—өрқ—¶а¶ўрқ—ёрқ—№рқ•һрқ—»рқ—јрқ—Ҫрқ—ҫрқ—ҝрқҳҖрқҳҒрқҳӮрқҳғрқҳ„рқҳ…рқҳҶрқҳҮ","рқ‘Ёрқ‘©рқ‘Әрқ‘«рқ‘¬рқ‘ӯрқ‘®рқ‘Ҝрқ‘°рқ‘ұрқ‘Ірқ‘ірқ‘ҙрқ‘өрқ‘¶рқ‘·рқ‘ёрқ‘№рқ‘әрқ‘»рқ‘јрқ‘Ҫрқ‘ҫрқ‘ҝрқ’Җрқ’Ғрқ’Ӯрқ’ғрқ’„рқ’…рқ’Ҷрқ’Үрқ’Ҳрқ’үрқ’Ҡрқ’Ӣрқ’Ңрқ‘ірқ’Һрқ’Ҹрқ’җрқ’‘рқ’’рқ’“рқ’”рқ’•рқ’–рқ’—рқ’ҳрқ’ҷрқ’ҡрқ’ӣ"]; let results = ""; maps.forEach(m => { let d = ""; let mapChars = Array.from(m); for(let char of name){ let idx = alpha.indexOf(char); d += (idx > -1 && mapChars[idx]) ? mapChars[idx] : char; } results += `<div class="style-row"><span>${d}</span><button class="cp" onclick="cp('${d}', this)"><img src="${COPY_ICON}"></button></div>`; }); return results; }

    function showWelcome() {
      botReply(`ШЈЩҮЩ„Ш§ЩӢ ШЁЩғ ЩҒЩҠ <b>рқ‘©рқ‘¶рқ‘» рқ’Ғрқ‘Ё5рқ‘№рқ‘Ёрқ‘ӯрқ‘Ё</b> вңЁ<br>
      вҖў Ш§ЩғШӘШЁ Ш§ШіЩ…Щғ Щ„Щ„ШІШ®ШұЩҒШ©<br>
      вҖў ШұЩӮЩ… вқ¶ Ш§ШіЩ… ЩҒШ§ШұШә<br>
      вҖў ШұЩӮЩ… вһӢ ШұЩ…ЩҲШІ Щ…Щ…ЩҠШІШ©<br>
      вҖў ШұЩӮЩ… вһҢ ШӘЩ„ЩҲЩҠЩҶ Ш§Щ„Ш§ШіЩ…Ш§ШЎ<br>
      вҖў ШұЩӮЩ… вһҚ Ш§ШіЩ…Ш§ШЎ ЩғЩ„Ш§ЩҶШ§ШӘ`);
    }

    function send() {
      const inp = document.getElementById("inp");
      let val = inp.value.trim(); if (!val) return;
      const toCircleNumbers = (text) => text.replace(/1/g, "вқ¶").replace(/2/g, "вһӢ").replace(/3/g, "вһҢ").replace(/4/g, "вһҚ");
      const normalizedVal = val.replace(/вқ¶/g, "1").replace(/вһӢ/g, "2").replace(/вһҢ/g, "3").replace(/вһҚ/g, "4");
      const chat = document.getElementById("chat");
      const userRow = document.createElement("div"); userRow.className = "row user";
      userRow.innerHTML = `<div class="bubble">${toCircleNumbers(val)}</div>`;
      chat.appendChild(userRow);
      
      if (state === "waiting_color_name") {
        let cHtml = `<div style="max-height: 300px; overflow-y: auto; padding-right: 5px;">`;
        EXTENDED_COLORS.forEach(hex => { const ffColor = `[${hex.replace("#", "").toUpperCase()}]`; cHtml += `<div class="style-row"><span style="color: ${hex};">${val}</span><button class="cp" onclick="cp('${ffColor}${val}', this)"><img src="${COPY_ICON}"></button></div>`; });
        cHtml += `</div>`;
        botReply(`ШӘЩ… ШӘЩ„ЩҲЩҠЩҶ Ш§ШіЩ…Щғ:<br>${cHtml}`); state = "idle";
      } else if (normalizedVal === "1") {
        botReply(`Ш§Щ„ШЈШіЩ…Ш§ШЎ Ш§Щ„ЩҒШ§ШұШәШ©:<br><div class="style-row"><span>г…Ө </span><button class="cp" onclick="cp('г…Ө', this)"><img src="${COPY_ICON}"></button></div><div class="style-row"><span>г…Ө г…Ө </span><button class="cp" onclick="cp('г…Ө г…Ө', this)"><img src="${COPY_ICON}"></button></div>`);
      } else if (normalizedVal === "2") {
        let sHtml = ""; for(let s of SYMBOLS) sHtml += `<button class="symbol-btn" onclick="cp('${s}', this)">${s}</button>`;
        botReply(`<div style="display:flex; flex-wrap:wrap; justify-content:center;">${sHtml}</div>`);
      } else if (normalizedVal === "3") {
        state = "waiting_color_name"; botReply("ШЈШұШіЩ„ Ш§Щ„Ш§ШіЩ… Ш§Щ„Ш°ЩҠ ШӘШұЩҠШҜ ШӘЩ„ЩҲЩҠЩҶЩҮ...");
      } else if (normalizedVal === "4") {
        let clHtml = ""; CLAN_NAMES.forEach(n => { clHtml += `<div class="style-row"><span>${n}</span><button class="cp" onclick="cp('${n}', this)"><img src="${COPY_ICON}"></button></div>`; });
        botReply(`ШЈШіЩ…Ш§ШЎ Ш§Щ„ЩғЩ„Ш§ЩҶШ§ШӘ:<br>${clHtml}`);
      } else {
        botReply(`ШІШ®ШұЩҒШ© "${val}":<br>${decorate(val)}`);
      }
      inp.value = ""; chat.scrollTop = chat.scrollHeight;
    }

    document.getElementById("inp").addEventListener("keypress", (e) => { if(e.key === "Enter") send(); });
</script>
</body>
</html>
